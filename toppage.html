<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>トップページ（テスト）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #f7fbff, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            color: #4B7BEF;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #4B7BEF;
            color: #ffffff;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: background 0.12s;
        }
        .btn:hover {
            background: #3A6AD4;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>トップページ（テスト）</h1>
        <p>このページからチャットページに遷移して、<br>遷移元（referrer）が「other」になるか検証します。</p>
        <a class="btn" href="./index.html">チャットページへ移動</a>
    </div>
</body>
</html>
