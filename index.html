<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>Agentforce Chat Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: #f7f7f7;
    }

    .page {
      min-height: 100vh;
      padding: 40px 24px;
      box-sizing: border-box;
    }

    .sample-card {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="sample-card">
      <h1>Agentforce チャット検証</h1>
      <p>
        外部メニューUIを外し、Deployment切替だけ残した状態です。<br>
        ?product=auto / ?product=fire で読み込むDeploymentを切り替えます。
      </p>
    </section>
  </main>

  <script>
    function getProductType() {
      return new URLSearchParams(window.location.search).get("product");
    }

    function getDeploymentConfig() {
      const productType = getProductType();

      if (productType === "auto") {
        return {
          deploymentName: "archi_auto_test",
          siteUrl: "https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWarchiautotest1781762678353",
          bootstrapUrl: "https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWarchiautotest1781762678353/assets/js/bootstrap.min.js",
          scrt2URL: "https://d5h00000141dheay--agent0507.sandbox.my.salesforce-scrt.com"
        };
      }

      if (productType === "fire") {
        return {
          deploymentName: "archi_fire_test",
          siteUrl: "https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWarchifiretest1781759026666",
          bootstrapUrl: "https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWarchifiretest1781759026666/assets/js/bootstrap.min.js",
          scrt2URL: "https://d5h00000141dheay--agent0507.sandbox.my.salesforce-scrt.com"
        };
      }

      return {
        deploymentName: "archi",
        siteUrl: "https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWarchi1780049930220",
        bootstrapUrl: "https://d5h00000141dheay--agent0507.sandbox.my.site.com/ESWarchi1780049930220/assets/js/bootstrap.min.js",
        scrt2URL: "https://d5h00000141dheay--agent0507.sandbox.my.salesforce-scrt.com"
      };
    }

    const deploymentConfig = getDeploymentConfig();

    console.log("Deployment:", deploymentConfig.deploymentName);

    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = "ja";

        embeddedservice_bootstrap.init(
          "00DIl000000H31Y",
          deploymentConfig.deploymentName,
          deploymentConfig.siteUrl,
          {
            scrt2URL: deploymentConfig.scrt2URL
          }
        );
      } catch (err) {
        console.error("Error loading Embedded Messaging:", err);
      }
    }

    const script = document.createElement("script");
    script.type = "text/javascript";
    script.src = deploymentConfig.bootstrapUrl;
    script.onload = initEmbeddedMessaging;
    document.body.appendChild(script);
  </script>
</body>
</html>
